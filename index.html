<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0B0D'/%3E%3Ccircle cx='16' cy='16' r='8' fill='none' stroke='%23FBF6E4' stroke-width='1.4'/%3E%3Cline x1='16' y1='2' x2='16' y2='30' stroke='%2300B7D4' stroke-width='1.4'/%3E%3Cline x1='2' y1='16' x2='30' y2='16' stroke='%23FF2D9B' stroke-width='1.4'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%23FFD43B'/%3E%3C/svg%3E">

<style>
  :root{
    --ink:#0A0B0D;          /* press black */
    --paper:#FBF6E4;        /* warm white-yellowish text */
    --muted:#83807A;        /* warm gray for labels */
    --cyan:#00B7D4;
    --magenta:#FF2D9B;
    --yellow:#FFD43B;
    --rail:#1C1E22;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ height:100%; }

  body{
    background:var(--ink);
    color:var(--paper);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100svh;
    display:grid;
    place-items:center;
    position:relative;
    overflow:hidden;
    padding:clamp(20px,5vw,56px);
  }

  /* Subtle CMY halftone + center glow, kept very quiet */
  body::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 30% 28%, rgba(0,183,212,.06), transparent 38%),
      radial-gradient(circle at 70% 30%, rgba(255,45,155,.05), transparent 40%),
      radial-gradient(circle at 50% 80%, rgba(255,212,59,.05), transparent 42%),
      radial-gradient(circle, rgba(255,255,255,.022) 1px, transparent 1.4px) 0 0 / 7px 7px;
    pointer-events:none;
  }
  /* Vignette to focus the centre */
  body::after{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,.55) 100%);
    pointer-events:none;
  }

  /* Printer's registration marks in the corners — like a press sheet */
  .reg{
    position:absolute; width:26px; height:26px; opacity:0;
    animation:fade 1s ease .2s forwards;
  }
  .reg svg{ width:100%; height:100%; display:block; }
  .reg.tl{ top:clamp(18px,4vw,40px); left:clamp(18px,4vw,40px); }
  .reg.tr{ top:clamp(18px,4vw,40px); right:clamp(18px,4vw,40px); }
  .reg.bl{ bottom:clamp(18px,4vw,40px); left:clamp(18px,4vw,40px); }
  .reg.br{ bottom:clamp(18px,4vw,40px); right:clamp(18px,4vw,40px); }

  .stage{
    position:relative;
    z-index:2;
    text-align:center;
    max-width:min(92vw, 860px);
  }

  /* ---- Brand lockup ---- */
  .brand{
    display:inline-flex; align-items:center; gap:.6em;
    font-family:var(--mono);
    font-size:clamp(11px,1.4vw,13px);
    letter-spacing:.42em;
    text-transform:uppercase;
    color:var(--paper);
    margin-bottom:clamp(34px,6vh,64px);
    opacity:0;
    animation:fade .8s ease .1s forwards;
  }
  .brand .mark{ width:14px; height:14px; }
  .brand b{ font-weight:700; }
  .brand .rip{ color:var(--paper); }

  /* ---- The print-registration headline ---- */
  .print-wrap{
    position:relative;
    display:inline-block;
    margin-bottom:clamp(26px,4.5vh,42px);
  }

  .print{
    position:relative;
    /* leading edge swept by the carriage */
    clip-path:inset(0 100% 0 0);
    animation:sweep 2.2s cubic-bezier(.62,.02,.34,1) .35s forwards;
  }

  .h1{
    font-size:clamp(30px,6.2vw,62px);
    font-weight:800;
    letter-spacing:-.02em;
    line-height:1.06;
    white-space:nowrap;
  }

  /* base 'printed' ink — warm white, fades in as the colour passes settles */
  .ink{
    position:relative;
    color:var(--paper);
    z-index:2;
    opacity:0;
    animation:settle 2.2s ease .35s forwards;
  }

  /* CMY separations — start misregistered, converge & fade (registration) */
  .sep{
    position:absolute; inset:0;
    z-index:1;
    mix-blend-mode:screen;
    will-change:transform,opacity;
  }
  .sep.c{ color:var(--cyan);    animation:reg-c 2.2s cubic-bezier(.62,.02,.34,1) .35s forwards; }
  .sep.m{ color:var(--magenta); animation:reg-m 2.2s cubic-bezier(.62,.02,.34,1) .35s forwards; }
  .sep.y{ color:var(--yellow);  animation:reg-y 2.2s cubic-bezier(.62,.02,.34,1) .35s forwards; }

  /* the printhead carriage that rides the leading edge */
  .carriage{
    position:absolute; top:50%; left:0;
    transform:translate(-50%,-50%);
    z-index:5; pointer-events:none;
    opacity:0;
    animation:ride 2.2s cubic-bezier(.62,.02,.34,1) .35s forwards;
  }
  .head{
    width:56px; height:22px; border-radius:5px;
    background:linear-gradient(180deg,#23262b,#121316);
    border:1px solid #2f333a;
    box-shadow:0 6px 18px rgba(0,0,0,.5);
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .head i{ width:5px; height:5px; border-radius:50%; display:block; }
  .head .ic{ background:var(--cyan); }
  .head .im{ background:var(--magenta); }
  .head .iy{ background:var(--yellow); }
  /* the active 'ink' beam printing the line */
  .beam{
    position:absolute; left:50%; top:18px; transform:translateX(-50%);
    width:2px; height:64px;
    background:linear-gradient(180deg, rgba(251,246,228,.9), rgba(251,246,228,0));
    filter:blur(.3px);
  }

  /* the rail the carriage travels along */
  .rail{
    height:1px; width:100%;
    background:linear-gradient(90deg, transparent, var(--rail) 12%, var(--rail) 88%, transparent);
    position:relative;
    margin-top:8px;
    opacity:0; animation:fade 1s ease 1.4s forwards;
  }

  /* ---- Sub line ---- */
  .sub{
    font-family:var(--mono);
    font-size:clamp(13px,1.9vw,17px);
    letter-spacing:.02em;
    color:var(--muted);
    opacity:0;
    animation:fade .7s ease 2.35s forwards;
  }
  .sub .lead{ color:var(--paper); }
  .caret{
    display:inline-block; width:.6em; height:1.05em;
    background:var(--yellow);
    margin-left:.12em; vertical-align:-.18em;
    animation:blink 1.05s steps(1) 2.6s infinite;
  }

  /* ---- Status dock ---- */
  .dock{
    display:inline-flex; align-items:center; gap:.85em;
    margin-top:clamp(40px,7vh,72px);
    font-family:var(--mono);
    font-size:clamp(10px,1.3vw,12px);
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--muted);
    opacity:0; animation:fade .8s ease 2.8s forwards;
  }
  .nozzles{ display:inline-flex; gap:5px; }
  .nozzles span{ width:6px; height:6px; border-radius:50%; opacity:.25; }
  .nozzles .c{ background:var(--cyan);    animation:pulse 1.6s ease .0s infinite; }
  .nozzles .m{ background:var(--magenta); animation:pulse 1.6s ease .25s infinite; }
  .nozzles .y{ background:var(--yellow);  animation:pulse 1.6s ease .5s infinite; }

  .tagline{
    position:absolute; bottom:clamp(18px,4vw,40px); left:0; right:0;
    text-align:center;
    font-family:var(--mono);
    font-size:11px; letter-spacing:.34em; text-transform:uppercase;
    color:#46443f;
    opacity:0; animation:fade 1s ease 3s forwards;
    z-index:2;
  }

  /* ---- keyframes ---- */
  @keyframes sweep{ to{ clip-path:inset(0 0 0 0); } }
  @keyframes settle{ 0%{opacity:0} 70%{opacity:.4} 100%{opacity:1} }
  @keyframes ride{ 0%{opacity:0; left:0} 6%{opacity:1} 92%{opacity:1; left:100%} 100%{opacity:0; left:100%} }
  @keyframes reg-c{ 0%{opacity:.85; transform:translate(-9px,-3px)} 80%{opacity:.5} 100%{opacity:0; transform:translate(0,0)} }
  @keyframes reg-m{ 0%{opacity:.85; transform:translate(8px,3px)}   80%{opacity:.5} 100%{opacity:0; transform:translate(0,0)} }
  @keyframes reg-y{ 0%{opacity:.85; transform:translate(2px,-6px)}  80%{opacity:.5} 100%{opacity:0; transform:translate(0,0)} }
  @keyframes fade{ to{ opacity:1; } }
  @keyframes blink{ 0%,50%{opacity:1} 51%,100%{opacity:0} }
  @keyframes pulse{ 0%,100%{opacity:.22} 50%{opacity:1} }

  @media (max-width:540px){
    .h1{ white-space:normal; }
  }

  /* Respect reduced-motion: show the finished print, no sweep */
  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; }
    .print{ clip-path:none; }
    .ink{ opacity:1; }
    .sep,.carriage{ display:none; }
    .reg,.brand,.rail,.sub,.dock,.tagline{ opacity:1; }
    .nozzles span{ opacity:.7; }
  }
</style>
</head>
<body>

  <!-- corner registration marks -->
  <div class="reg tl" aria-hidden="true"><svg viewBox="0 0 26 26"><circle cx="13" cy="13" r="6" fill="none" stroke="#3a3d42" stroke-width="1"/><line x1="13" y1="0" x2="13" y2="26" stroke="#3a3d42" stroke-width="1"/><line x1="0" y1="13" x2="26" y2="13" stroke="#3a3d42" stroke-width="1"/></svg></div>
  <div class="reg tr" aria-hidden="true"><svg viewBox="0 0 26 26"><circle cx="13" cy="13" r="6" fill="none" stroke="#3a3d42" stroke-width="1"/><line x1="13" y1="0" x2="13" y2="26" stroke="#3a3d42" stroke-width="1"/><line x1="0" y1="13" x2="26" y2="13" stroke="#3a3d42" stroke-width="1"/></svg></div>
  <div class="reg bl" aria-hidden="true"><svg viewBox="0 0 26 26"><circle cx="13" cy="13" r="6" fill="none" stroke="#3a3d42" stroke-width="1"/><line x1="13" y1="0" x2="13" y2="26" stroke="#3a3d42" stroke-width="1"/><line x1="0" y1="13" x2="26" y2="13" stroke="#3a3d42" stroke-width="1"/></svg></div>
  <div class="reg br" aria-hidden="true"><svg viewBox="0 0 26 26"><circle cx="13" cy="13" r="6" fill="none" stroke="#3a3d42" stroke-width="1"/><line x1="13" y1="0" x2="13" y2="26" stroke="#3a3d42" stroke-width="1"/><line x1="0" y1="13" x2="26" y2="13" stroke="#3a3d42" stroke-width="1"/></svg></div>

  <main class="stage">
    <div class="brand">
      <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
        <circle cx="16" cy="16" r="8" fill="none" stroke="#FBF6E4" stroke-width="1.6"/>
        <line x1="16" y1="2" x2="16" y2="30" stroke="#00B7D4" stroke-width="1.6"/>
        <line x1="2" y1="16" x2="30" y2="16" stroke="#FF2D9B" stroke-width="1.6"/>
        <circle cx="16" cy="16" r="2.2" fill="#FFD43B"/>
      </svg>
      <span><b>VELOCI</b><span class="rip">RIP</span></span>
    </div>

    <div class="print-wrap">
      <div class="print">
        <div class="h1">
          <span class="sep c" aria-hidden="true">You love printing, we do too!</span>
          <span class="sep m" aria-hidden="true">You love printing, we do too!</span>
          <span class="sep y" aria-hidden="true">You love printing, we do too!</span>
          <span class="ink">You love printing, we do too!</span>
        </div>
      </div>

      <div class="carriage" aria-hidden="true">
        <div class="head"><i class="ic"></i><i class="im"></i><i class="iy"></i></div>
        <div class="beam"></div>
      </div>

      <div class="rail"></div>
    </div>

    <p class="sub"><span class="lead">…ripping soon</span>, stay tuned.<span class="caret" aria-hidden="true"></span></p>

    <div class="dock">
      <span class="nozzles" aria-hidden="true"><span class="c"></span><span class="m"></span><span class="y"></span></span>
      <span>RIP status — warming up</span>
    </div>
  </main>

  <div class="tagline">Raster Image Processor</div>

</body>
</html>
